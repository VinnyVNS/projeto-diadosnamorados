<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dia dos Namorados</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">❤️Dia dos Namorados❤️</div>
            <ul class="navegacao">
                <li><a class="navTexto" href="#home">Home</a></li>
                <li><a class="navTexto" href="#galeria">Galeria</a></li>
                <li><a class="navTexto" href="#contato">Contato/Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main id="home">
        <section id="fraseNamorilson">
            <button onclick="namorilson()" id="btn-namorilson" class="btn1">Meu amor por você</button>
            <div id="fraseRandom"></div>
        </section>

        <section id="galeria">
            <h2>📷Galeria📷</h2>
            <div class="galeria">
                <div class="galeria-item">
                    <img src="https://cdn.pixabay.com/photo/2019/01/10/19/36/frame-3925925_1280.jpg" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2024/01/29/08/54/hot-air-balloon-8539287_1280.png" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2024/02/01/10/55/heart-8545742_1280.jpg" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2023/01/23/15/04/couple-7738917_1280.png" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2023/01/22/23/59/couple-7737589_1280.png" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2020/04/11/01/14/couple-5028351_1280.jpg" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2023/02/10/07/59/fox-7780326_1280.jpg" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2023/02/02/13/27/cat-7762887_1280.jpg" class="img-clicavel">
                    <img src="https://cdn.pixabay.com/photo/2021/01/26/14/30/rose-5951728_1280.jpg" class="img-clicavel">
                </div>
            </div>
            <div id="overlay">
                <img id="imagemGrande" src="" alt="Imagem ampliada">
            </div>
        </section>
    </main>



    <footer>
        <section id="contato">
            <h2>Mande sua mensagem!</h2>
            <div class="contato-container">
                <div class="contato-text">
                    <h3>Informações</h3>
                </div>
            </div>
            <form class="contato-form" id="meuformulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" class="contato-info" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" class="contato-info" required placeholder="Digite seu email">
            </div>
            <div class="form-text">
                <label for="mensagem"><strong>Mensagem:</strong></label>
                <br>
                <textarea id="mensagem" required placeholder="Digite sua mensagem"></textarea>
                <br>
                <button type="submit">Enviar Mensagem</button>
            </div>
            <p>&copy; 2026</p>
        </section> 

        <section id="sobre">
            <h2><strong>Sobre</strong></h2>
            <p>Um site especial sobre o dia dos namorados, feito para um projeto de curso.</p>
        </section>
    </footer>

    <script src="script.js"></script>
</body>
</html>
