<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dia dos Namorados</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Dia dos Namorilsons❤️</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <button class="btn1">Namorilson</button>
        <button class="btn2">Namorilson2</button>
        <section id="galeria">
            <h2>Nossa Galeria</h2>
            <div class="galeria">
                <div class="galeria-item">
                    <img src="https://picsum.photos/400/400?radom=1" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=2" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=3" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=4" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=5" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=6" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=7" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=8" alt="Natureza 1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=9" alt="Natureza 1" class="img-clicavel">
                </div>
            </div>
        </section>
    </main>



    <footer>
        <section id="contato">
            <h2>Fale conosco</h2>
            <div class="contato-container">
                <div class="contato-info">
                    <h3>Informações</h3>
                    <strong>Endereço</strong>
                    <p>Senai Floripa</p>
                </div>
            </div>
        </section> 

        <form class="contato-form" id="meuformulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" required placeholder="Digite seu email">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <br>
                <textarea id="mensagem" required placeholder="Digite sua mensagem"></textarea>
            </div>

            <button type="submit">Enviar Mensagem</button>
        </form>
        <p>&copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
