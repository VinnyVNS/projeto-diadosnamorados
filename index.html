<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dia dos Namorados</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Dia dos Namorilsons❤️</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <button class="btn1">Namorilson</button>
        <section id="galeria">
            <h2>Nossa Galeria</h2>
            <div class="galeria">
                <div class="galeria-item">
                    <img src="https://picsum.photos/400/400?radom=1" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=2" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=3" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=4" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=5" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=6" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=7" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=8" class="img-clicavel">
                    <img src="https://picsum.photos/400/400?radom=9" class="img-clicavel">
                </div>
            </div>
        </section>
    </main>



    <footer>
        <section id="contato">
            <h2>Mande sua mensagem!</h2>
            <div class="contato-container">
                <div class="contato-text">
                    <h3>Informações</h3>
                </div>
            </div>
            <form class="contato-form" id="meuformulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" class="contato-info" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" class="contato-info" required placeholder="Digite seu email">
            </div>
            <div class="form-text">
                <label for="mensagem"><strong>Mensagem:</strong></label>
                <br>
                <textarea id="mensagem" required placeholder="Digite sua mensagem"></textarea>
                <br>
                <button type="submit">Enviar Mensagem</button>
            </div>
            <p>&copy; 2026</p>
        </section> 
    </footer>

    <script src="script.js"></script>
</body>
</html>
